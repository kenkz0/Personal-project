services:
  - type: web
    name: lam-kinh-cover-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python pc_cover_api.py
    healthCheckPath: /health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: lam-kinh-postgres
          property: connectionString

databases:
  - name: lam-kinh-postgres
    databaseName: lam_kinh
    user: lam_kinh
